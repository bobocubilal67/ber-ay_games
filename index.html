<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Çocuklar Platform Macerası</title>
    <!-- Phaser.js Oyun Motorunu Kütüphane Olarak Ekliyoruz -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #char-selection {
            margin: 20px;
            text-align: center;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }
        .btn:hover { background-color: #2980b9; }
        #game-container {
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: none;
        }
    </style>
</head>
<body>

    <div id="char-selection">
        <h1>Karakterini Seç ve Maceraya Başla!</h1>
        <!-- Karakter Listesi ve Güç Tanımları -->
        <button class="btn" onclick="startGame('Beril')">Beril (9 Yaş) - Hızlı Koşma ⚡</button>
        <button class="btn" onclick="startGame('Aybars')">Aybars (2 Yaş) - Yüksek Zıplama 🦘</button>
        <button class="btn" onclick="startGame('Neriman')">Neriman (9 Yaş) - Normal 💪</button>
        <button class="btn" onclick="startGame('Meryem')">Meryem (9 Yaş) - Normal 🛡️</button>
        <button class="btn" onclick="startGame('Masal')">Masal (5 Yaş) - Normal 🎈</button>
        <button class="btn" onclick="startGame('Bartu')">Bartu (9 Yaş) - Normal 💥</button>
    </div>

    <div id="game-container"></div>

    <script>
        let secilenKarakter = "";

        // Seçim butonuna tıklandığında oyunu başlatan fonksiyon
        function startGame(karakterIsmi) {
            secilenKarakter = karakterIsmi;
            document.getElementById('char-selection').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // Phaser Oyununu Başlat
            new Phaser.Game(config);
        }

        // Phaser Konfigürasyonu
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 300 }, // Yerçekimi (Mario hissi için)
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        let player;
        let platforms;
        let cursors;
        let monsters;
        let score = 0;
        let scoreText;
        let characterText;

        function preload() {
            // Şimdilik görseller yerine Phaser'ın kendi renkli karelerini/çizimlerini kullanacağız.
            // Bu fonksiyon ileride kendi çizdiğiniz görselleri (spritesheet) yüklemek için kullanılacak.
        }

        function create() {
            // 1. Zemin ve Platformları Oluşturma
            platforms = this.physics.add.staticGroup();

            // Ana Zemin (Koyu Yeşil)
            let ground = this.add.rectangle(400, 580, 800, 40, 0x27ae60);
            platforms.add(ground);

            // Havada Duracak Mario Tarzı Platformlar (Kahverengi)
            let plat1 = this.add.rectangle(600, 400, 200, 20, 0xd35400);
            let plat2 = this.add.rectangle(200, 300, 200, 20, 0xd35400);
            let plat3 = this.add.rectangle(400, 180, 150, 20, 0xd35400);
            platforms.add(plat1);
            platforms.add(plat2);
            platforms.add(plat3);

            // 2. Oyuncu Karakterini Oluşturma (Mavi Dikdörtgen)
            player = this.add.rectangle(100, 450, 32, 48, 0x3498db);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true); // Ekrandan dışarı çıkmasın

            // 3. Canavarları Oluşturma (Kırmızı Dikdörtgenler)
            monsters = this.physics.add.group();
            let monster1 = this.add.rectangle(600, 360, 30, 30, 0xe74c3c);
            let monster2 = this.add.rectangle(200, 260, 30, 30, 0xe74c3c);
            monsters.add(monster1);
            monsters.add(monster2);

            // Canavarlara fizik ve basit sağa sola hareket verelim
            monsters.children.iterate(function (monster) {
                this.physics.add.existing(monster);
                monster.body.setCollideWorldBounds(true);
                monster.body.setVelocityX(Phaser.Math.Between(-100, -50));
            }, this);

            // 4. Çarpışma Kuralları (Fizik Kontrolleri)
            this.physics.add.collider(player, platforms);
            this.physics.add.collider(monsters, platforms);
            
            // Canavara çarpınca ne olacağını belirliyoruz
            this.physics.add.overlap(player, monsters, hitMonster, null, this);

            // 5. Klavye Kontrollerini Aktif Etme
            cursors = this.input.keyboard.createCursorKeys();

            // 6. Bilgi Yazıları
            characterText = this.add.text(16, 16, 'Karakter: ' + secilenKarakter, { fontSize: '20px', fill: '#fff' });
            scoreText = this.add.text(16, 45, 'Canavarlardan Kaç!', { fontSize: '18px', fill: '#fff' });
        }

        function update() {
            // --- HIZ VE ZIPLAMA AYARLARI (ÖZEL GÜÇLER) ---
            let normalHiz = 160;
            let hizliKosma = 320; // Beril için 2 kat hız
            
            let normalZiplama = -250;
            let yuksekZiplama = -450; // Aybars için yüksek zıplama

            let aktifHiz = (secilenKarakter === "Beril") ? hizliKosma : normalHiz;
            let aktifZiplama = (secilenKarakter === "Aybars") ? yuksekZiplama : normalZiplama;

            // --- HAREKET KONTROLLERİ ---
            if (cursors.left.isDown) {
                player.body.setVelocityX(-aktifHiz);
            } else if (cursors.right.isDown) {
                player.body.setVelocityX(aktifHiz);
            } else {
                player.body.setVelocityX(0);
            }

            // Zıplama Kontrolü (Sadece zemine basıyorsa zıplayabilir)
            if (cursors.up.isDown && player.body.touching.down) {
                player.body.setVelocityY(aktifZiplama);
            }

            // Canavarların sınıra gelince yön değiştirmesi (Basit Yapay Zeka)
            monsters.children.iterate(function (monster) {
                if (monster.body.blocked.left) {
                    monster.body.setVelocityX(80);
                } else if (monster.body.blocked.right) {
                    monster.body.setVelocityX(-80);
                }
            });
        }

        // Canavara çarpınca tetiklenen fonksiyon
        function hitMonster(player, monster) {
            this.physics.pause();
            player.setAlpha(0.5); // Karakteri şeffaf yap (yenildi efekti)
            scoreText.setText('Oyun Bitti! Yeniden başlamak için sayfayı yenileyin.');
        }
    </script>
</body>
</html>

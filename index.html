<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Çocuklar: Macera (Designed by DtBY)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body {
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif; 
            color: #2c3e50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        #char-selection { 
            text-align: center; 
            padding: 30px 20px; 
            max-width: 500px; 
            width: 92%; 
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
            border: 4px dashed #ff7675;
            backdrop-filter: blur(5px);
        }
        
        .btn-char {
            color: #2c3e50; 
            padding: 14px 20px; 
            margin: 10px 0; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 16px; 
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .btn-beril { background: #efe5ff; border: 3px solid #b38bff; box-shadow: 0 5px 0 #9b62ff; color: #4a154b; }
        .btn-aybars { background: #fab1a0; border: 3px solid #ff7675; box-shadow: 0 5px 0 #e17055; }
        .btn-neriman { background: #dfe6e9; border: 3px solid #b2bec3; box-shadow: 0 5px 0 #636e72; }
        .btn-meryem { background: #74b9ff; border: 3px solid #0984e3; box-shadow: 0 5px 0 #74b9ff; }
        .btn-masal { background: #ff85a2; border: 3px solid #ff477e; box-shadow: 0 5px 0 #ff0a54; color: white; text-shadow: none; }
        .btn-bartu { background: #a29bfe; border: 3px solid #6c5ce7; box-shadow: 0 5px 0 #6c5ce7; color: white; text-shadow: none; }

        .btn-char:active { 
            transform: scale(0.95) translateY(4px); 
            box-shadow: 0 1px 0 transparent;
        }
        
        #game-wrapper { display: none; position: relative; width: 100vw; height: 100vh; max-width: 800px; max-height: 600px; }
        #game-container { width: 100%; height: 70%; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .mobile-controls {
            width: 100%; height: 30%; background: #ff7675;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; position: relative; border-top: 4px solid #fff;
        }
        .nav-buttons { display: flex; gap: 15px; }
        .action-buttons { display: flex; gap: 15px; }
        
        .ctrl-btn {
            width: 70px; height: 70px; background: #ffeaa7; border: 3px solid #fdcb6e; border-radius: 50%;
            color: #2c3e50; font-size: 28px; font-weight: bold; box-shadow: 0 6px 0 #f1c40f;
            display: flex; align-items: center; justify-content: center;
        }
        .ctrl-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #f1c40f; }
        .jump-btn { background: #55efc4; border-color: #00b894; box-shadow: 0 6px 0 #00b894; }
        .jump-btn:active { box-shadow: 0 2px 0 #00b894; }
        .ability-btn { background: #a29bfe; border-color: #6c5ce7; color: white; font-size: 32px; box-shadow: 0 6px 0 #6c5ce7; display: none; }

        .signature-top { font-size: 18px; color: #ff477e; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        .footer-credits { position: absolute; bottom: 3px; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.8); font-weight: bold; pointer-events: none; left: 0; }

        #game-over-screen {
            display: none; position: absolute; top: 10%; left: 50%; transform: translate(-50%, 0);
            background: rgba(255, 255, 255, 0.95); border: 4px solid #ff7675; border-radius: 20px;
            padding: 25px; text-align: center; z-index: 1000; width: 85%; max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #game-over-screen h2 { color: #ff7675; margin-top: 0; font-size: 26px; }
        .popup-btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-restart { background-color: #55efc4; color: #2c3e50; border: 2px solid #00b894; }
        .btn-close-game { background-color: #dfe6e9; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="char-selection">
        <div class="signature-top">✨ Designed by DtBY ✨</div>
        <h2 style="margin-bottom: 20px; font-size: 26px; color: #6c5ce7; text-shadow: 1px 1px 0px white;">Süper Kahramanını Seç! 🚀</h2>
        
        <button class="btn-char btn-beril" onclick="startGame('Beril')">😈 Beril (9 Yaş) - Kuromi / Şeker Yağmuru (8sn)</button>
        <button class="btn-char btn-aybars" onclick="startGame('Aybars')">🍼 Aybars (2 Yaş) - Emekleyen Bebek / Mega Zıplama</button>
        <button class="btn-char btn-neriman" onclick="startGame('Neriman')">❄️ Neriman (9 Yaş) - Buz Kraliçesi / Canavarları Dondur</button>
        <button class="btn-char btn-meryem" onclick="startGame('Meryem')">🛡️ Meryem (9 Yaş) - Zırhlı Şövalye / Çift Zıplama</button>
        <button class="btn-char btn-masal" onclick="startGame('Masal')">🎈 Masal (5 Yaş) - Balonlu Peri / Süzülerek Uçma</button>
        <button class="btn-char btn-bartu" onclick="startGame('Bartu')">👻 Bartu (9 Yaş) - Casus Hayalet / Görünmezlik</button>
        
        <div style="margin-top:20px; font-size:12px; color:#636e72; font-weight: bold;">Bilal Yıldırım tarafından yapılmıştır. 🌟</div>
    </div>

    <div id="game-wrapper">
        <div id="game-over-screen">
            <h2 id="end-title">OYUN BİTTİ</h2>
            <p id="end-msg" style="color:#555; margin-bottom:20px; font-weight: bold;">Canavara yakalandın!</p>
            <button class="popup-btn btn-restart" onclick="restartGameInstance()">🔄 Yeniden Başlat</button>
            <button class="popup-btn btn-close-game" onclick="closeGameInstance()">❌ Oyunu Kapat</button>
        </div>

        <div id="game-container"></div>
        
        <div class="mobile-controls">
            <div class="nav-buttons">
                <button id="btnLeft" class="ctrl-btn">◀</button>
                <button id="btnRight" class="ctrl-btn">▶</button>
            </div>
            <div class="action-buttons">
                <button id="btnAbility" class="ctrl-btn ability-btn">★</button>
                <button id="btnJump" class="ctrl-btn jump-btn">▲</button>
            </div>
            <div class="footer-credits">Bilal Yıldırım tarafından yapılmıştır. | Designed by DtBY</div>
        </div>
    </div>

    <script>
        let secilenKarakter = ""; let moveDir = 0; let gameInstance = null;
        let playerLives = 1; let isInvulnerable = false; let isAbilityActive = false;
        let abilityTimerEvent = null; let bossActive = false; let bossTimer = 30; let bossTimerEvent = null;
        
        let meryemJumpCount = 0;
        let specialAbilityTimer = 0;
        let specialAbilityTimerEvent = null;
        
        let currentLevel = 1;
        let monsterCounter = 0; 

        function startGame(karakterIsmi) {
            secilenKarakter = karakterIsmi; playerLives = 1; isInvulnerable = false; isAbilityActive = false;
            bossActive = false; bossTimer = 30; moveDir = 0; meryemJumpCount = 0; currentLevel = 1; monsterCounter = 0;
            
            document.getElementById('char-selection').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'block';
            document.getElementById('game-over-screen').style.display = 'none';
            
            const abBtn = document.getElementById('btnAbility');
            if(secilenKarakter !== "Aybars" && secilenKarakter !== "Meryem") {
                abBtn.style.display = "flex"; abBtn.style.opacity = "1";
            } else { abBtn.style.display = "none"; }

            setupMobileControls();
            if (gameInstance) gameInstance.destroy(true);
            gameInstance = new Phaser.Game(config);
        }

        function restartGameInstance() { closeGameInstance(); }
        function closeGameInstance() {
            if (gameInstance) { gameInstance.destroy(true); gameInstance = null; }
            if (abilityTimerEvent) abilityTimerEvent.remove();
            if (bossTimerEvent) bossTimerEvent.remove();
            if (specialAbilityTimerEvent) specialAbilityTimerEvent.remove();
            moveDir = 0;
            document.getElementById('game-wrapper').style.display = 'none';
            document.getElementById('char-selection').style.display = 'block';
        }

        function setupMobileControls() {
            document.getElementById('btnLeft').onpointerdown = () => { moveDir = -1; };
            document.getElementById('btnLeft').onpointerup = () => { moveDir = 0; };
            document.getElementById('btnRight').onpointerdown = () => { moveDir = 1; };
            document.getElementById('btnRight').onpointerup = () => { moveDir = 0; };
            document.getElementById('btnJump').onpointerdown = () => { makePlayerJump(); };
            document.getElementById('btnAbility').onpointerdown = () => { triggerSpecialAbility(); };
        }

        function makePlayerJump() {
            if (!player || !player.body) return;

            if (secilenKarakter === "Meryem") {
                if (player.body.touching.down || player.body.blocked.down) {
                    meryemJumpCount = 1;
                    player.body.setVelocityY(-360);
                } else if (meryemJumpCount < 2) {
                    meryemJumpCount = 2;
                    player.body.setVelocityY(-340);
                    gameInstance.scene.scenes[0].showFloatingText("ÇİFT ZIPLAMA! 🛡️", 0x3498db);
                }
                return;
            }

            if (player.body.touching.down || player.body.blocked.down) {
                let gravityFactor = (isAbilityActive && secilenKarakter === "Masal") ? -200 : -360;
                let ziplamaGucu = (secilenKarakter === "Aybars") ? -540 : gravityFactor;
                player.body.setVelocityY(ziplamaGucu);
            }
        }

        function triggerSpecialAbility() {
            if (isAbilityActive) return;
            isAbilityActive = true;
            document.getElementById('btnAbility').style.opacity = "0.4";

            let activeScene = gameInstance.scene.scenes[0];
            
            if (secilenKarakter === "Beril") specialAbilityTimer = 8;
            else if (secilenKarakter === "Bartu") specialAbilityTimer = 10;
            else specialAbilityTimer = 15;

            if (secilenKarakter === "Beril") {
                activeScene.showFloatingText("KUROMİ ŞEKER YAĞMURU! 🍭💜", 0xff477e);
                monsters.children.iterate((m) => { 
                    if(m && m.body) {
                        m.isCandy = true;
                        redrawMonsterGraphics(m);
                    } 
                });
            } else if (secilenKarakter === "Neriman") {
                activeScene.showFloatingText("DONDURMA GÜCÜ AKTİF! ❄️", 0x3498db);
                monsters.children.iterate((m) => { if(m && m.body && !m.isStunned) m.body.setVelocityX(0); });
            } else if (secilenKarakter === "Masal") {
                activeScene.showFloatingText("SÜZÜLME AKTİF! 🎈", 0xf1c40f);
                activeScene.physics.world.gravity.y = 250; 
            } else if (secilenKarakter === "Bartu") {
                activeScene.showFloatingText("GÖRÜNMEZLİK AKTİF! 👻", 0x9b59b6);
                player.setAlpha(0.4); 
            }

            abilityText.setText('ÖZEL GÜÇ SÜRESİ: ' + specialAbilityTimer + ' sn');
            
            specialAbilityTimerEvent = activeScene.time.addEvent({
                delay: 1000, loop: true,
                callback: () => {
                    specialAbilityTimer--;
                    if (specialAbilityTimer > 0) {
                        abilityText.setText('ÖZEL GÜÇ SÜRESİ: ' + specialAbilityTimer + ' sn');
                    } else {
                        abilityText.setText('');
                        if(specialAbilityTimerEvent) specialAbilityTimerEvent.remove();
                    }
                }
            });

            abilityTimerEvent = activeScene.time.delayedCall(specialAbilityTimer * 1000, () => {
                isAbilityActive = false;
                document.getElementById('btnAbility').style.opacity = "1";
                abilityText.setText('');
                
                activeScene.physics.world.gravity.y = 800; 
                if(player) player.setAlpha(1); 
                
                monsters.children.iterate((m) => { 
                    if(m && m.body) {
                        m.isCandy = false;
                        redrawMonsterGraphics(m);
                    } 
                });

                activeScene.showFloatingText("Özel Güç Bitti", 0xffffff);
            }, [], activeScene);
        }

        const config = {
            type: Phaser.AUTO, width: 800, height: 450, parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
            scene: { create: create, update: update }
        };

        let player; let platforms; let monsters; let hearts; let bosses;
        let infoText; let livesText; let bossText; let abilityText;

        function create() {
            let self = this;
            this.physics.world.setBounds(0, 0, 3200, 450); 
            this.cameras.main.setBounds(0, 0, 3200, 450);

            // 🌈 EĞLENCELİ ÇOCUK ARKA PLANI (Gökyüzü Mavisi ve Tatlı Çizgi Film Bulutları)
            let bgGraphics = this.add.graphics();
            bgGraphics.fillStyle(0xdff9fb, 1); // Açık tatlı gökyüzü mavisi
            bgGraphics.fillRect(0, 0, 3200, 450);

            // Arka plana dekoratif sevimli beyaz bulutlar çiziliyor
            bgGraphics.fillStyle(0xffffff, 0.8);
            for (let b = 0; b < 25; b++) {
                let bx = Phaser.Math.Between(50, 3100);
                let by = Phaser.Math.Between(30, 150);
                bgGraphics.fillCircle(bx, by, 25);
                bgGraphics.fillCircle(bx + 20, by - 10, 30);
                bgGraphics.fillCircle(bx + 40, by, 25);
                bgGraphics.fillCircle(bx + 20, by + 10, 25);
            }

            platforms = this.physics.add.group({ allowGravity: false, immovable: true });
            
            // Çimenlik Alan (Zemin)
            let ground = this.add.rectangle(1600, 435, 3200, 30, 0x2ecc71);
            platforms.add(ground);

            // Dengeli ve takılmayı önleyen yükseklik sıralaması
            let platformHeights = [370, 310, 250, 190, 130, 340, 220, 160];
            
            // 🛠️ TAKILMAYI ÖNLEYEN DÜZENLEME: 
            // İlk platformun x konumunu 240'tan 320'ye kaydırdık. Böylece karakter rahatça sağa yürür.
            for (let i = 0; i < 45; i++) {
                let x = 320 + (i * 75); 
                let y = platformHeights[i % platformHeights.length];
                let w = Phaser.Math.Between(70, 105);
                let renk = (currentLevel === 1) ? 0xff7675 : (currentLevel === 2 ? 0x74b9ff : 0xa29bfe); // Daha pastel çocuk renkleri
                let block = this.add.rectangle(x, y, w, 12, renk);
                platforms.add(block);
                
                if (currentLevel === 2) {
                    block.setAngle(Phaser.Math.Between(-8, 8));
                    if(block.body) block.body.setSize(w, 12);
                } else if (currentLevel === 3) {
                    if (i % 2 === 0) {
                        self.tweens.add({
                            targets: block.body.velocity, y: 60, yoyo: true, repeat: -1, duration: Phaser.Math.Between(1800, 2800)
                        });
                    } else {
                        self.tweens.add({
                            targets: block.body.velocity, x: 50, yoyo: true, repeat: -1, duration: Phaser.Math.Between(2000, 3200)
                        });
                    }
                }
            }

            // Karakter oluşturma
            player = this.add.container(100, 350);
            let pG = this.add.graphics();

            if (secilenKarakter === "Beril") {
                // 😈 BERİL ARTIK KUROMI! 💜🖤
                pG.fillStyle(0x2d142c, 1); 
                pG.fillRoundedRect(-13, -2, 26, 24, 6);
                pG.fillStyle(0xff75a0, 1);
                pG.fillCircle(-8, 0, 3); pG.fillCircle(0, 2, 3); pG.fillCircle(8, 0, 3);
                pG.fillStyle(0xffffff, 1); 
                pG.fillCircle(0, -14, 12);
                pG.fillStyle(0x1a051d, 1);
                pG.beginPath(); pG.arc(0, -14, 12.5, Math.PI, 0, false); pG.fill();
                pG.fillTriangle(-12, -20, -18, -35, -4, -24); 
                pG.fillTriangle(12, -20, 18, -35, 4, -24);   
                pG.fillStyle(0xff75a0, 1);
                pG.fillCircle(-18, -35, 3.5); pG.fillCircle(18, -35, 3.5);
                pG.fillStyle(0xff75a0, 1);
                pG.fillCircle(0, -22, 3.5); pG.fillRect(-2, -19, 4, 3);    
                pG.fillStyle(0x2d142c, 1);
                pG.fillTriangle(-7, -15, -3, -13, -4, -17); 
                pG.fillTriangle(7, -15, 3, -13, 4, -17);   
                pG.fillStyle(0xffb3c6, 0.7);
                pG.fillCircle(-8, -10, 2.5); pG.fillCircle(8, -10, 2.5);
                pG.fillStyle(0xff75a0, 1); pG.fillCircle(0, -11, 1);
            } 
            else if (secilenKarakter === "Aybars") {
                pG.fillStyle(0x2ecc71, 1); pG.fillRoundedRect(-18, 5, 34, 16, 6);
                pG.fillStyle(0xffffff, 1); pG.fillCircle(-16, 8, 7);
                pG.fillStyle(0xffdbac, 1); pG.fillCircle(10, 2, 11);
                pG.fillStyle(0x4a2711, 1); pG.fillRect(8, -12, 3, 4);
                pG.fillStyle(0x2c3e50, 1); pG.fillCircle(13, 0, 2);
            } 
            else if (secilenKarakter === "Neriman") {
                pG.fillStyle(0x74b9ff, 1); pG.fillTriangle(0, -5, -15, 24, 15, 24);
                pG.fillStyle(0xffffff, 1); pG.fillCircle(0, 10, 3);
                pG.fillStyle(0xffdbac, 1); pG.fillCircle(0, -14, 11);
                pG.fillStyle(0xfdcb6e, 1); pG.fillCircle(-10, -10, 6); pG.fillCircle(10, -10, 6); pG.fillRect(-12, -10, 24, 12);
                pG.fillStyle(0xae2573, 1); pG.fillRect(10, 0, 3, 20); pG.fillStyle(0xffff00, 1); pG.fillCircle(11, 0, 4);
                pG.fillStyle(0x2c3e50, 1); pG.fillCircle(-3, -14, 2); pG.fillCircle(3, -14, 2);
            } 
            else if (secilenKarakter === "Meryem") {
                pG.fillStyle(0x7f8c8d, 1); pG.fillRoundedRect(-12, -4, 24, 26, 6);
                pG.fillStyle(0xbdc3c7, 1); pG.fillCircle(-13, 8, 9); pG.fillStyle(0xc0392b, 1); pG.fillCircle(-13, 8, 4);
                pG.fillStyle(0xffdbac, 1); pG.fillCircle(0, -14, 11);
                pG.fillStyle(0x95a5a6, 1); pG.arc(0, -15, 12, Math.PI, 0, false); pG.fill();
                pG.fillStyle(0xd35400, 1); pG.fillTriangle(0, -27, -5, -34, 5, -34);
                pG.fillStyle(0x2c3e50, 1); pG.fillCircle(-4, -12, 2); pG.fillCircle(4, -12, 2);
            } 
            else if (secilenKarakter === "Masal") {
                pG.fillStyle(0xff781f, 0.6); pG.fillCircle(-14, 2, 8); pG.fillCircle(-14, 12, 6);
                pG.fillStyle(0xff85a2, 1); pG.fillRoundedRect(-11, -4, 22, 25, 8);
                pG.fillStyle(0xffdbac, 1); pG.fillCircle(0, -14, 11);
                pG.fillStyle(0x2c3e50, 1); pG.fillCircle(0, -16, 12); pG.fillStyle(0xff477e, 1); pG.fillCircle(8, -22, 4);
                pG.fillStyle(0xe74c3c, 1); pG.fillRect(11, 5, 1, 15); pG.fillStyle(0xff477e, 1); pG.fillCircle(11, 2, 6);
                pG.fillStyle(0x2c3e50, 1); pG.fillCircle(-4, -12, 2); pG.fillCircle(4, -12, 2);
            } 
            else if (secilenKarakter === "Bartu") {
                pG.fillStyle(0x6c5ce7, 1); pG.fillRoundedRect(-12, -4, 24, 26, 4);
                pG.fillStyle(0xffdbac, 1); pG.fillCircle(0, -14, 11);
                pG.fillStyle(0x4a2711, 1); pG.fillRect(-5, -10, 10, 3);
                pG.fillStyle(0x341f97, 1); pG.beginPath(); pG.arc(0, -14, 13, Math.PI, 0, false); pG.fill();
                pG.fillStyle(0x00ff00, 1); pG.fillCircle(-4, -13, 2.5); pG.fillCircle(4, -13, 2.5);
            }

            if(secilenKarakter === "Beril") {
                pG.lineStyle(1.5, 0x2d142c, 1); pG.beginPath(); pG.arc(0, -8, 2, 0, Math.PI, false); pG.strokePath();
            } else if(secilenKarakter !== "Aybars" && secilenKarakter !== "Bartu") {
                pG.lineStyle(2, 0xe74c3c, 1); pG.beginPath(); pG.arc(0, -9, 3, 0, Math.PI, false); pG.strokePath();
            } else if (secilenKarakter === "Aybars") {
                pG.lineStyle(1.5, 0xe74c3c, 1); pG.beginPath(); pG.arc(12, 4, 2, 0, Math.PI, false); pG.strokePath();
            }

            player.add(pG);
            this.physics.add.existing(player);
            
            // 🛠️ COK DAHA RAHAT HAREKET İÇİN HİTBOX BOYUTU 38 PİKSELE DÜŞÜRÜLDÜ
            player.body.setSize(24, 38);
            player.body.setOffset(-12, -15);
            player.body.setCollideWorldBounds(true);
            this.cameras.main.startFollow(player, true, 0.1, 0.1); 

            monsters = this.physics.add.group();
            let monsterCount = currentLevel * 5 + 8; 
            for(let m = 0; m < monsterCount; m++) {
                spawnMonster(this, Phaser.Math.Between(550, 2400), Phaser.Math.Between(100, 300));
            }

            hearts = this.physics.add.group();
            this.time.addEvent({
                delay: Phaser.Math.Between(6000, 10000),
                callback: () => {
                    if (hearts.getLength() < 2 && playerLives < 3 && !self.physics.world.isPaused && !bossActive) {
                        let heart = self.add.circle(player.x + Phaser.Math.Between(120, 280), Phaser.Math.Between(150, 350), 12, 0xe74c3c);
                        hearts.add(heart); self.physics.add.existing(heart); heart.body.setAllowGravity(false);
                    }
                }, loop: true
            });

            bosses = this.physics.add.group({ allowGravity: true });

            this.physics.add.collider(player, platforms);
            this.physics.add.collider(monsters, platforms);
            this.physics.add.collider(bosses, platforms);

            this.physics.add.overlap(player, hearts, (p, h) => {
                if (playerLives < 3) { playerLives++; h.destroy(); livesText.setText('❤️ Canlar: ' + '❤️'.repeat(playerLives)); self.showFloatingText("+1 CAN!", 0x2ecc71); }
            });

            this.physics.add.overlap(player, monsters, (p, monster) => {
                if (isAbilityActive && secilenKarakter === "Bartu") return;

                if (monster.isCandy) {
                    monster.destroy();
                    self.showFloatingText("ŞEKER KAPALDI! 🍬", 0xff477e);
                    return;
                }

                let isOnTop = (p.body.velocity.y >= -50 && p.y < monster.y - 10);

                if (isOnTop) {
                    if (monster.touchCount === 1) {
                        monster.destroy();
                        self.showFloatingText("YOK EDİLDİ! 💥", 0x2ecc71);
                        p.body.setVelocityY(-250); 
                        meryemJumpCount = 1;
                    } else if (!monster.isStunned) {
                        monster.isStunned = true;
                        monster.touchCount = 1; 
                        redrawMonsterGraphics(monster); 
                        if (monster.body) {
                            monster.body.setVelocityX(0);
                            monster.body.setVelocityY(0);
                            monster.body.setSize(30, 12);
                        }
                        self.showFloatingText("BAYILDI! 💤", 0xf1c40f);
                        p.body.setVelocityY(-270); 
                        meryemJumpCount = 1;
                    }
                } else {
                    if (monster.isStunned) return;
                    if (isInvulnerable) return;

                    if (playerLives > 1) {
                        playerLives--; 
                        livesText.setText('❤️ Canlar: ' + '❤️'.repeat(playerLives)); 
                        triggerInvulnerability(self);
                    } else {
                        gameOver(self, "Canavara yakalandın ve hiç kalbin kalmadı!");
                    }
                }
            });

            let levelLabel = (currentLevel === 3) ? "3 (FİNAL)" : currentLevel;
            // Metin renkleri açık arka plana uyması için koyu yapıldı
            infoText = this.add.text(15, 15, 'Kahraman: ' + secilenKarakter + ' | Bölüm: ' + levelLabel, { fontSize: '15px', color: '#2c3e50', fontWeight: 'bold' }).setScrollFactor(0).setDepth(100);
            livesText = this.add.text(15, 40, '❤️ Canlar: ❤️', { fontSize: '15px', color: '#e74c3c', fontWeight: 'bold' }).setScrollFactor(0).setDepth(100);
            
            abilityText = this.add.text(400, 25, '', { fontSize: '18px', color: '#fff', fontWeight: 'bold', backgroundColor: '#6c5ce7', padding: 5 }).setOrigin(0.5).setScrollFactor(0).setDepth(102);
            bossText = this.add.text(400, 60, '', { fontSize: '20px', color: '#fff', fontWeight: 'bold', backgroundColor: '#e74c3c', padding: 5 }).setOrigin(0.5).setScrollFactor(0).setDepth(101);

            this.showFloatingText = function(text, color) {
                let txt = self.add.text(player.x - 40, player.y - 70, text, { fontSize: '14px', color: Phaser.Display.Color.IntegerToColor(color).rgba, fontWeight:'bold' }).setDepth(99);
                self.tweens.add({ targets: txt, y: txt.y - 50, alpha: 0, duration: 1200, onComplete: () => { if(txt) txt.destroy(); } });
            };
        }

        function redrawMonsterGraphics(m) {
            let g = m.first; 
            g.clear();

            if (m.isCandy) {
                g.fillStyle(0xffffff, 1); g.fillRect(-2, 0, 4, 18); 
                g.fillStyle(0xff85a2, 1); g.fillCircle(0, -6, 12); 
                g.lineStyle(2, 0xff477e, 1); g.beginPath(); g.arc(0, -6, 7, 0, Math.PI * 2); g.strokePath(); 
            } else if (m.isStunned) {
                g.fillStyle(0x3498db, 1); g.fillRoundedRect(-14, -8, 28, 16, 6);
                g.lineStyle(2, 0x2c3e50, 1); g.lineBetween(-6, -2, -2, -2); g.lineBetween(2, -2, 6, -2);
            } else {
                g.fillStyle(0xc0392b, 1); g.fillRoundedRect(-14, -14, 28, 28, 8); 
                g.fillStyle(0xffffff, 1); g.fillCircle(0, -2, 8);
                g.fillStyle(0x2c3e50, 1); g.fillCircle(0, -2, 3.5);
                g.lineStyle(2, 0x000000, 1); g.lineBetween(-9, -10, -1, -7); g.lineBetween(1, -7, 9, -10);
                g.fillStyle(0xffffff, 1); g.fillTriangle(-6, 8, -2, 8, -4, 12); g.fillTriangle(2, 8, 6, 8, 4, 12);
            }
        }

        function spawnMonster(scene, x, y) {
            monsterCounter++;
            let m = scene.add.container(x, y);
            let mGraphics = scene.add.graphics();
            m.add(mGraphics);

            m.canavarKimligi = monsterCounter; m.isStunned = false; m.touchCount = 0; m.isCandy = false; 

            redrawMonsterGraphics(m);
            monsters.add(m);
            scene.physics.add.existing(m); 
            m.body.setSize(26, 26);
            m.body.setOffset(-13, -13);
            m.body.setCollideWorldBounds(true);
            
            if (isAbilityActive && secilenKarakter === "Beril") {
                m.isCandy = true; redrawMonsterGraphics(m);
            }
        }

        function triggerInvulnerability(scene) {
            isInvulnerable = true; scene.showFloatingText("KORUMA AKTİF", 0xf39c12);
            scene.tweens.add({
                targets: player, alpha: 0.2, duration: 150, yoyo: true, repeat: 8,
                onComplete: () => { if(player) player.alpha = 1; isInvulnerable = false; }
            });
        }

        function advanceLevel(scene) {
            scene.physics.pause();
            if(bossTimerEvent) bossTimerEvent.remove();
            if(specialAbilityTimerEvent) specialAbilityTimerEvent.remove();
            currentLevel++; bossActive = false; bossTimer = 30;
            let upperText = (currentLevel === 3) ? "FİNAL BÖLÜMÜNE GEÇİLİYOR!" : `BÖLÜM ${currentLevel}'YE GEÇİLİYOR!`;
            bossText.setText(upperText).setColor("#fff");
            scene.time.delayedCall(3000, () => { bossText.setText(''); scene.scene.restart(); });
        }

        function gameOver(scene, message, title = "OYUN BİTTİ") {
            scene.physics.pause(); moveDir = 0;
            if(bossTimerEvent) bossTimerEvent.remove();
            if(specialAbilityTimerEvent) specialAbilityTimerEvent.remove();
            document.getElementById('end-title').innerText = title;
            document.getElementById('end-title').style.color = (title === "TEBRİKLER!") ? "#2ecc71" : "#e74c3c";
            document.getElementById('end-msg').innerText = message;
            document.getElementById('game-over-screen').style.display = 'block';
        }

        function update() {
            let hizAyari = (secilenKarakter === "Beril") ? 230 : 185;
            if (player && player.body && !player.scene.physics.world.isPaused) {
                player.body.setVelocityX(moveDir * hizAyari);
            }

            if (!bossActive && monsters && monsters.children && (!isAbilityActive || (secilenKarakter !== "Neriman" && secilenKarakter !== "Beril"))) {
                monsters.children.iterate((m) => {
                    if (m && m.body && player) {
                        if (m.isStunned) { m.body.setVelocityX(0); return; }
                        m.body.setVelocityX(player.x > m.x ? 80 : -80);

                        if (m.body.blocked.left || m.body.blocked.right || (player.y < m.y - 35 && Phaser.Math.Between(0, 100) > 96)) {
                            if (m.body.blocked.down || m.body.touching.down) m.body.setVelocityY(-320);
                        }
                    }
                });
            }

            if (player.x > 2500 && !bossActive) {
                bossActive = true;
                let scene = player.scene;
                scene.cameras.main.stopFollow();
                monsters.clear(true, true); 

                let spawnCount = (currentLevel === 3) ? 2 : 1;
                
                for(let b=0; b < spawnCount; b++) {
                    let bossItem = scene.add.container(player.x + 200 + (b * 70), 150);
                    let bG = scene.add.graphics();
                    bG.fillStyle(0x2c3e50, 1); bG.fillRoundedRect(-25, -35, 50, 70, 15);
                    bG.fillStyle(0xf1c40f, 1); bG.fillCircle(-10, -10, 6); bG.fillCircle(10, -10, 6);
                    bG.fillStyle(0x000000, 1); bG.fillCircle(-10, -10, 2); bG.fillCircle(10, -10, 2);
                    bG.fillStyle(0xc0392b, 1); bG.fillRect(-15, 10, 30, 10);
                    
                    bossItem.add(bG); bosses.add(bossItem);
                    scene.physics.add.existing(bossItem);
                    bossItem.body.setSize(46, 66);
                    bossItem.body.setOffset(-23, -33);
                    bossItem.body.setCollideWorldBounds(true);
                    bossItem.body.setBounce(0.3);
                    
                    scene.physics.add.overlap(player, bossItem, () => {
                        if(!isInvulnerable) gameOver(scene, "Bölüm sonu canavarına elendin!");
                    });
                }

                scene.time.addEvent({
                    delay: 800, loop: true,
                    callback: () => {
                        bosses.children.iterate((bossItem) => {
                            if (bossItem && bossItem.body) {
                                bossItem.body.setVelocityX(player.x > bossItem.x ? 135 : -135);
                                if (bossItem.body.blocked.left || bossItem.body.blocked.right || (player.y < bossItem.y - 40 && Phaser.Math.Between(0,10) > 5)) {
                                    if(bossItem.body.blocked.down || bossItem.body.touching.down) bossItem.body.setVelocityY(-330);
                                }
                            }
                        });
                    }
                });

                let headerMsg = (currentLevel === 3) ? 'FİNAL BOSS SAVAŞI! KALAN SÜRE: ' : 'BOSS SAVAŞI! KALAN SÜRE: ';
                bossText.setText(headerMsg + bossTimer + 'sn').setColor("#fff");
                
                bossTimerEvent = scene.time.addEvent({
                    delay: 1000, loop: true,
                    callback: () => {
                        bossTimer--;
                        bossText.setText(headerMsg + bossTimer + 'sn');
                        if (bossTimer <= 0) {
                            if (currentLevel < 3) advanceLevel(scene);
                            else gameOver(scene, "TÜM BÖLÜMLERİ GEÇTİN! MUHTEŞEM BİR ZAFER!", "TEBRİKLER!");
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>

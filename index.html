<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Çocuklar: Macera (Designed by DtBY)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #char-selection {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 90%;
        }
        
        /* 🎨 Belirginleştirilmiş ve Siyah Yazılı Karakter Butonları */
        .btn-char {
            background: #ffffff; /* Tam beyaz arka plan */
            color: #000000;      /* Net siyah yazı rengi */
            border: 3px solid #3498db; /* Belirgin mavi çerçeve */
            padding: 15px 20px;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;   /* Kalın yazı */
            cursor: pointer;
            border-radius: 12px;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        .btn-char:active { 
            transform: scale(0.98); 
            background: #e0e0e0;
        }
        
        #game-wrapper {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px;
            max-height: 600px;
        }
        #game-container {
            width: 100%;
            height: 70%;
        }
        
        /* Mobil Dokunmatik Buton Alanı */
        .mobile-controls {
            width: 100%;
            height: 30%;
            background: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: relative;
        }
        .nav-buttons { display: flex; gap: 15px; }
        .action-buttons { display: flex; gap: 15px; }
        
        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 6px 0 #c0392b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c0392b;
        }
        .jump-btn { background: #2ecc71; box-shadow: 0 6px 0 #27ae60; }
        .jump-btn:active { box-shadow: 0 2px 0 #27ae60; }
        
        /* Özel Güç Tuşu */
        .ability-btn { background: #f1c40f; color: #2c3e50; font-size: 32px; box-shadow: 0 6px 0 #f39c12; display: none; }
        .ability-btn:active { box-shadow: 0 2px 0 #f39c12; }

        .signature-top {
            font-size: 16px;
            color: #f1c40f;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .footer-credits {
            position: absolute;
            bottom: 3px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
            left: 0;
        }

        /* OYUN BİTTİ PANELİ */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, 0);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #e74c3c;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            z-index: 1000;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }
        #game-over-screen h2 { color: #e74c3c; margin-top: 0; }
        .popup-btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-restart { background-color: #2ecc71; color: white; }
        .btn-close-game { background-color: #7f8c8d; color: white; }
    </style>
</head>
<body>

    <!-- Karakter Seçim Ekranı -->
    <div id="char-selection">
        <div class="signature-top">Designed by DtBY</div>
        <h2 style="margin-bottom: 25px; font-size: 24px;">Süper Kahramanını Seç!</h2>
        <button class="btn-char" onclick="startGame('Beril')">⚡ Beril (9 Yaş) - Süper Hız (Pasif)</button>
        <button class="btn-char" onclick="startGame('Aybars')">🦘 Aybars (2 Yaş) - Mega Zıplama (Pasif)</button>
        <button class="btn-char" onclick="startGame('Neriman')">❄️ Neriman (9 Yaş) - Canavarları Dondur</button>
        <button class="btn-char" onclick="startGame('Meryem')">🛡️ Meryem (9 Yaş) - Koruma Kalkanı</button>
        <button class="btn-char" onclick="startGame('Masal')">🎈 Masal (5 Yaş) - Süzülerek Uçma</button>
        <button class="btn-char" onclick="startGame('Bartu')">💥 Bartu (9 Yaş) - Güç Dalgası (Yok Et)</button>
        <div style="margin-top:25px; font-size:13px; color:#ccc; font-weight: bold;">Bilal Yıldırım tarafından yapılmıştır.</div>
    </div>

    <!-- Oyun Alanı -->
    <div id="game-wrapper">
        <div id="game-over-screen">
            <h2>OYUN BİTTİ</h2>
            <p style="color:#ddd; margin-bottom:20px;">Canavara yakalandın ve hiç kalbin kalmadı!</p>
            <button class="popup-btn btn-restart" onclick="restartGameInstance()">🔄 Yeniden Başlat</button>
            <button class="popup-btn btn-close-game" onclick="closeGameInstance()">❌ Oyunu Kapat</button>
        </div>

        <div id="game-container"></div>
        
        <!-- Mobil Kontroller -->
        <div class="mobile-controls">
            <div class="nav-buttons">
                <button id="btnLeft" class="ctrl-btn">◀</button>
                <button id="btnRight" class="ctrl-btn">▶</button>
            </div>
            <div class="action-buttons">
                <button id="btnAbility" class="ctrl-btn ability-btn">★</button>
                <button id="btnJump" class="ctrl-btn jump-btn">▲</button>
            </div>
            
            <div class="footer-credits">
                Bilal Yıldırım tarafından yapılmıştır. | Designed by DtBY
            </div>
        </div>
    </div>

    <script>
        let secilenKarakter = "";
        let moveDir = 0; 
        let gameInstance = null;
        let playerLives = 1; 
        let isInvulnerable = false; 
        let isAbilityActive = false;
        let abilityTimerEvent = null;

        function startGame(karakterIsmi) {
            secilenKarakter = karakterIsmi;
            playerLives = 1; 
            isInvulnerable = false;
            isAbilityActive = false;
            
            document.getElementById('char-selection').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'block';
            document.getElementById('game-over-screen').style.display = 'none';
            
            const abBtn = document.getElementById('btnAbility');
            if(secilenKarakter !== "Beril" && secilenKarakter !== "Aybars") {
                abBtn.style.display = "flex";
                abBtn.style.opacity = "1";
            } else {
                abBtn.style.display = "none";
            }

            setupMobileControls();
            if (gameInstance) gameInstance.destroy(true);
            gameInstance = new Phaser.Game(config);
        }

        function restartGameInstance() {
            closeGameInstance();
        }

        function closeGameInstance() {
            if (gameInstance) {
                gameInstance.destroy(true);
                gameInstance = null;
            }
            if (abilityTimerEvent) abilityTimerEvent.remove();
            moveDir = 0;
            document.getElementById('game-wrapper').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('char-selection').style.display = 'block';
        }

        function setupMobileControls() {
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');
            const btnAbility = document.getElementById('btnAbility');

            btnLeft.onpointerdown = () => { moveDir = -1; };
            btnLeft.onpointerup = () => { moveDir = 0; };
            btnRight.onpointerdown = () => { moveDir = 1; };
            btnRight.onpointerup = () => { moveDir = 0; };
            btnJump.onpointerdown = () => { makePlayerJump(); };
            
            btnAbility.onpointerdown = () => { triggerSpecialAbility(); };
        }

        function makePlayerJump() {
            if (player && player.body && player.body.touching.down) {
                let gravityFactor = (isAbilityActive && secilenKarakter === "Masal") ? -180 : -320;
                let ziplamaGucu = (secilenKarakter === "Aybars") ? -550 : gravityFactor;
                player.body.setVelocityY(ziplamaGucu);
            }
        }

        function triggerSpecialAbility() {
            if (isAbilityActive) return; 
            isAbilityActive = true;
            document.getElementById('btnAbility').style.opacity = "0.4"; 

            let activeScene = gameInstance.scene.scenes[0];
            activeScene.showFloatingText("ÖZEL GÜÇ AKTİF!", 0xf1c40f);

            if (secilenKarakter === "Neriman") {
                monsters.children.iterate((m) => { if(m && m.body) m.body.setVelocityX(0); });
            } else if (secilenKarakter === "Meryem") {
                player.setTint(0x3498db); 
            } else if (secilenKarakter === "Masal") {
                activeScene.physics.world.gravity.y = 200; 
            } else if (secilenKarakter === "Bartu") {
                monsters.clear(true, true);
                activeScene.showFloatingText("CANAVARLAR YOK EDİLDİ!", 0xe74c3c);
            }

            abilityTimerEvent = activeScene.time.delayedCall(15000, () => {
                isAbilityActive = false;
                document.getElementById('btnAbility').style.opacity = "1";
                activeScene.physics.world.gravity.y = 700; 
                if(player && player.clearTint) player.clearTint();
                activeScene.showFloatingText("Özel Güç Bitti", 0xffffff); // Hata düzelten tırnak ve renk düzeltmesi
                
                if(secilenKarakter === "Neriman" && monsters) {
                    monsters.children.iterate((m) => { if(m && m.body) m.body.setVelocityX(-60); });
                }
            }, [], activeScene);
        }

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 450,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 700 }, debug: false } },
            scene: { create: create, update: update }
        };

        let player; let platforms; let monsters; let hearts;
        let infoText; let livesText;

        function create() {
            let self = this;
            this.cameras.main.setBackgroundColor('#34495e');

            platforms = this.physics.add.staticGroup();
            let ground = this.add.rectangle(400, 435, 800, 30, 0x27ae60);
            platforms.add(ground);
            platforms.add(this.add.rectangle(600, 300, 200, 15, 0xe67e22));
            platforms.add(this.add.rectangle(200, 220, 200, 15, 0xe67e22));

            player = this.add.rectangle(100, 350, 35, 50, 0x9b59b6);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            monsters = this.physics.add.group();
            spawnMonster(this, 600, 260);
            spawnMonster(this, 200, 180);

            hearts = this.physics.add.group();
            this.time.addEvent({
                delay: Phaser.Math.Between(5000, 12000), 
                callback: () => {
                    if (hearts.getLength() < 1 && playerLives < 3 && !self.physics.world.isPaused) {
                        let xPos = Phaser.Math.Between(100, 700);
                        let yPos = Phaser.Math.Between(150, 350);
                        
                        let heart = self.add.circle(xPos, yPos, 12, 0xe74c3c);
                        hearts.add(heart);
                        self.physics.add.existing(heart);
                        heart.body.setAllowGravity(false); 
                    }
                },
                loop: true
            });

            this.physics.add.collider(player, platforms);
            this.physics.add.collider(monsters, platforms);
            
            this.physics.add.overlap(player, hearts, (p, heart) => {
                if (playerLives < 3) {
                    playerLives++;
                    heart.destroy();
                    livesText.setText('❤️ Canlar: ' + '❤️'.repeat(playerLives));
                    self.showFloatingText("+1 CAN ALINDI!", 0x2ecc71);
                }
            }, null, this);

            this.physics.add.overlap(player, monsters, () => {
                if (isInvulnerable) return; 
                if (isAbilityActive && secilenKarakter === "Meryem") return; 

                if (playerLives > 1) {
                    playerLives--;
                    livesText.setText('❤️ Canlar: ' + '❤️'.repeat(playerLives));
                    triggerInvulnerability(self);
                } else {
                    self.physics.pause();
                    moveDir = 0;
                    document.getElementById('game-over-screen').style.display = 'block';
                }
            }, null, this);

            infoText = this.add.text(15, 15, 'Süper Kahraman: ' + secilenKarakter, { fontSize: '15px', color: '#fff', fontWeight: 'bold' });
            livesText = this.add.text(15, 40, '❤️ Canlar: ❤️', { fontSize: '15px', color: '#e74c3c', fontWeight: 'bold' });
            
            this.showFloatingText = function(text, color) {
                let txt = self.add.text(player.x - 40, player.y - 50, text, { fontSize: '14px', color: Phaser.Display.Color.IntegerToColor(color).rgba, fontWeight:'bold' });
                self.tweens.add({ targets: txt, y: txt.y - 50, alpha: 0, duration: 1500, onComplete: () => { if(txt) txt.destroy(); } });
            };
        }

        function spawnMonster(scene, x, y) {
            let monster = scene.add.rectangle(x, y, 25, 25, 0xc0392b);
            monsters.add(monster);
            scene.physics.add.existing(monster);
            monster.body.setCollideWorldBounds(true);
            monster.body.setVelocityX(-60);
        }

        function triggerInvulnerability(scene) {
            isInvulnerable = true;
            scene.showFloatingText("1 CAN GİTTİ! KORUMA AKTİF", 0xf39c12);

            scene.tweens.add({
                targets: player,
                alpha: 0.2,
                duration: 150,
                yoyo: true,
                repeat: 8, 
                onComplete: () => {
                    if(player) player.alpha = 1;
                    isInvulnerable = false;
                }
            });
        }

        function update() {
            let hizAyari = (secilenKarakter === "Beril") ? 350 : 180;
            if (player && player.body && !player.scene.physics.world.isPaused) {
                player.body.setVelocityX(moveDir * hizAyari);
            }

            if (!isAbilityActive || secilenKarakter !== "Neriman") {
                if (monsters && monsters.children) {
                    monsters.children.iterate((monster) => {
                        if (monster && monster.body && monster.body.blocked) {
                            if (monster.body.blocked.left) monster.body.setVelocityX(60);
                            if (monster.body.blocked.right) monster.body.setVelocityX(-60);
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>

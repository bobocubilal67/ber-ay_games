<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Süper Çocuklar: Macera</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #game-container { width: 100vw; height: 80vh; }
        .ui-footer { color: white; text-align: center; padding: 10px; font-family: sans-serif; font-size: 12px; }
        .controls { display: flex; gap: 20px; margin-top: 10px; }
        .btn { padding: 20px 30px; font-size: 20px; background: #e74c3c; border: none; border-radius: 10px; color: white; }
    </style>
</head>
<body>

    <div id="game-container"></div>
    
    <!-- Mobil Kontroller -->
    <div class="controls">
        <button class="btn" onclick="moveLeft()">◀</button>
        <button class="btn" onclick="jump()">▲</button>
        <button class="btn" onclick="moveRight()">▶</button>
    </div>

    <div class="ui-footer">
        <p>Bilal Yıldırım tarafından yapılmıştır.</p>
        <p>Designed by DtBY</p>
    </div>

    <script>
        // Basitleştirilmiş kontrol değişkenleri
        let moveDir = 0;
        const moveLeft = () => { moveDir = -1; setTimeout(() => moveDir = 0, 200); };
        const moveRight = () => { moveDir = 1; setTimeout(() => moveDir = 0, 200); };
        const jump = () => { if(player.body.touching.down) player.body.setVelocityY(-400); };

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 600,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 600 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;

        function create() {
            // Arkaplan ve Zemin
            this.add.rectangle(400, 580, 800, 40, 0x27ae60);
            
            // KARAKTER GÖRSELLEŞTİRME FİKRİ:
            // Gerçek görselleri eklemek için "this.load.image('beril', 'beril.png');" 
            // diyerek kendi çizimlerinizi yükleyebilirsiniz.
            player = this.add.rectangle(100, 450, 40, 60, 0x3498db);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
        }

        function update() {
            player.body.setVelocityX(moveDir * 200);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Çocuklar: Macera (Designed by DtBY)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #char-selection {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 90%;
        }
        .btn-char {
            background: linear-gradient(135px, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 15px 20px;
            margin: 8px 0;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 12px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .btn-char:active { transform: scale(0.98); }
        
        #game-wrapper {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px;
            max-height: 600px;
        }
        #game-container {
            width: 100%;
            height: 70%;
        }
        
        /* Mobil Dokunmatik Buton Alanı */
        .mobile-controls {
            width: 100%;
            height: 30%;
            background: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .nav-buttons { display: flex; gap: 20px; }
        .ctrl-btn {
            width: 75px;
            height: 75px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 30px;
            font-weight: bold;
            box-shadow: 0 6px 0 #c0392b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c0392b;
        }
        .jump-btn { background: #2ecc71; box-shadow: 0 6px 0 #27ae60; }
        .jump-btn:active { box-shadow: 0 2px 0 #27ae60; }

        /* Reklam ve İmzalar */
        .signature-top {
            font-size: 14px;
            color: #f1c40f;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .footer-credits {
            position: absolute;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
            left: 0;
        }
    </style>
</head>
<body>

    <div id="char-selection">
        <div class="signature-top">Designed by DtBY</div>
        <h2 style="margin-bottom: 25px;">Süper Kahramanını Seç!</h2>
        <button class="btn-char" onclick="startGame('Beril')">⚡ Beril (9 Yaş) - Süper Hız</button>
        <button class="btn-char" onclick="startGame('Aybars')">🦘 Aybars (2 Yaş) - Mega Zıplama</button>
        <button class="btn-char" onclick="startGame('Neriman')">🛡️ Neriman (9 Yaş)</button>
        <button class="btn-char" onclick="startGame('Meryem')">🔮 Meryem (9 Yaş)</button>
        <button class="btn-char" onclick="startGame('Masal')">🎈 Masal (5 Yaş)</button>
        <button class="btn-char" onclick="startGame('Bartu')">💥 Bartu (9 Yaş)</button>
        <div style="margin-top:20px; font-size:12px; color:#aaa;">Bilal Yıldırım tarafından yapılmıştır.</div>
    </div>

    <div id="game-wrapper">
        <div id="game-container"></div>
        
        <div class="mobile-controls">
            <div class="nav-buttons">
                <button id="btnLeft" class="ctrl-btn">◀</button>
                <button id="btnRight" class="ctrl-btn">▶</button>
            </div>
            <button id="btnJump" class="ctrl-btn jump-btn">▲</button>
            
            <div class="footer-credits">
                Bilal Yıldırım tarafından yapılmıştır. | Designed by DtBY
            </div>
        </div>
    </div>

    <script>
        let secilenKarakter = "";
        let moveDir = 0; // -1: Sol, 0: Dur, 1: Sağ

        function startGame(karakterIsmi) {
            secilenKarakter = karakterIsmi;
            document.getElementById('char-selection').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'block';
            
            // Kontrol butonlarının basılı tutulma (Touch) eventlerini bağlıyoruz
            setupMobileControls();
            
            // Oyunu Başlat
            new Phaser.Game(config);
        }

        // Basılı tutulduğu sürece sürekli hareket etme mekanizması
        function setupMobileControls() {
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');

            // Sol Buton Dokunma Yönetimi
            btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = -1; });
            btnLeft.addEventListener('touchend', () => { moveDir = 0; });
            btnLeft.addEventListener('mousedown', () => { moveDir = -1; }); // PC testi için
            btnLeft.addEventListener('mouseup', () => { moveDir = 0; });

            // Sağ Buton Dokunma Yönetimi
            btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = 1; });
            btnRight.addEventListener('touchend', () => { moveDir = 0; });
            btnRight.addEventListener('mousedown', () => { moveDir = 1; });
            btnRight.addEventListener('mouseup', () => { moveDir = 0; });

            // Zıplama (Sadece dokunulduğu an tek tetikleme)
            btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); makePlayerJump(); });
            btnJump.addEventListener('mousedown', () => { makePlayerJump(); });
        }

        function makePlayerJump() {
            if (player && player.body && player.body.touching.down) {
                // Aybars (2 yaş) çok yüksek zıplıyor, diğerleri normal
                let ziplamaGucu = (secilenKarakter === "Aybars") ? -550 : -320;
                player.body.setVelocityY(ziplamaGucu);
            }
        }

        // Phaser Yapılandırması
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 450, // Mobil ekran oranına uygun (16:9)
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 700 }, debug: false }
            },
            scene: { create: create, update: update }
        };

        let player;
        let platforms;
        let monsters;
        let infoText;

        function create() {
            // Arka Plan Rengi
            this.cameras.main.setBackgroundColor('#34495e');

            // Platformlar
            platforms = this.physics.add.staticGroup();
            
            // Ana zemin
            let ground = this.add.rectangle(400, 435, 800, 30, 0x27ae60);
            platforms.add(ground);

            // Havada asılı platformlar
            platforms.add(this.add.rectangle(600, 300, 200, 15, 0xe67e22));
            platforms.add(this.add.rectangle(200, 220, 200, 15, 0xe67e22));

            // Oyuncu (Süper Kahraman)
            // İleride buraya renkli kutu yerine kendi tasarladığınız süper kahraman resmini ekleyeceksiniz.
            player = this.add.rectangle(100, 350, 35, 50, 0x9b59b6);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            // Canavarlar
            monsters = this.physics.add.group();
            let monster1 = this.add.rectangle(600, 260, 25, 25, 0xc0392b);
            let monster2 = this.add.rectangle(200, 180, 25, 25, 0xc0392b);
            monsters.add(monster1);
            monsters.add(monster2);

            monsters.children.iterate((monster) => {
                this.physics.add.existing(monster);
                monster.body.setCollideWorldBounds(true);
                monster.body.setVelocityX(-60);
            });

            // Fizik Kuralları
            this.physics.add.collider(player, platforms);
            this.physics.add.collider(monsters, platforms);
            this.physics.add.overlap(player, monsters, () => {
                this.physics.physicsTimeScale = 0;
                infoText.setText('Oyun Bitti! Sayfayı Yenileyin.');
            }, null, this);

            // Ekran Bilgileri
            infoText = this.add.text(15, 15, 'Süper Kahraman: ' + secilenKarakter, { fontSize: '16px', color: '#fff', fontWeight: 'bold' });
        }

        function update() {
            // Beril (9 yaş) hızlı koşuyor, diğerleri normal
            let hizAyari = (secilenKarakter === "Beril") ? 350 : 180;
            
            // Basılı tutulan yöne göre sürekli hız uygulama
            player.body.setVelocityX(moveDir * hizAyari);

            // Canavar Yapay Zekası (Platform kenarından dönme)
            monsters.children.iterate((monster) => {
                if (monster.body.blocked.left) monster.body.setVelocityX(60);
                if (monster.body.blocked.right) monster.body.setVelocityX(-60);
            });
        }
    </script>
</body>
</html>
